name: Release
# release-please maintains a "release: x.y.z" PR from conventional commits on main.
# Merging it bumps the version + CHANGELOG and creates a GitHub release; the same
# run then builds and publishes to npm. Keeping publish in this job (gated on
# release_created) avoids the GITHUB_TOKEN-created release failing to trigger a
# separate `release: published` workflow.
on:
  push:
    branches: [master]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Set up Node
        uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: ./scripts/bootstrap

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: ./scripts/build

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        working-directory: dist
        # Authenticates with the NPM_TOKEN repository secret; --provenance still
        # attaches a build attestation (id-token: write is granted above).
        run: npm publish --provenance --access public
