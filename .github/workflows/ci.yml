name: CI
on:
  push:
    branches: ['**']
  pull_request: {}

jobs:
  build:
    timeout-minutes: 10
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: ./scripts/bootstrap

      - name: Lint
        run: ./scripts/lint

      - name: Test
        run: ./scripts/test --passWithNoTests
